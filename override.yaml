# ============================================================
# Clash Party 覆写配置 - 3X-UI VLESS + Reality + Vision 单美国节点
# 目标：国内直连 / 其他走美国节点 / DNS 防泄露 / 规则集自动更新
# 说明：这是 Clash Party YAML 覆写文件，不是独立 mihomo 配置文件。
# ============================================================

mode: rule
ipv6: false
unified-delay: true
tcp-concurrent: true

profile:
  store-selected: true
  store-fake-ip: true

# ============================================================
# TUN 与 DNS 防泄露
# Windows 下 strict-route 会添加防火墙规则，降低多宿主 DNS 泄露风险。
# 如 Clash Party 未以管理员权限运行导致 TUN 启动失败，可在 GUI 中开启 TUN
# 或把 tun.enable 改为 false，仅使用系统代理。
# ============================================================
tun!:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
  strict-route: true

dns!:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  prefer-h3: false
  use-hosts: true
  use-system-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "geosite:private"
    - "geosite:cn"
    - "geosite:apple-cn"
    - "geosite:microsoft@cn"
    - "geosite:steam@cn"
    - "geosite:category-games@cn"
    - "+.lan"
    - "+.local"
    - "+.localhost"
    - "localhost.ptlogin2.qq.com"
    - "dns.msftncsi.com"
    - "www.msftconnecttest.com"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - "+.market.xiaomi.com"
    - "+.push.apple.com"
    - "time.*.com"
    - "time.*.gov"
    - "time.*.edu.cn"
    - "time.*.apple.com"
    - "time1.*.com"
    - "time2.*.com"
    - "time3.*.com"
    - "time4.*.com"
    - "time5.*.com"
    - "time6.*.com"
    - "time7.*.com"
    - "*.ntp.org.cn"
    - "*.pool.ntp.org"

  # 仅用于解析 DNS 服务器域名，必须是 IP 或基于 IP 的加密 DNS。
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - tls://223.5.5.5

  # 默认 DNS 用国内加密 DNS；代理域名在 fake-ip + 规则命中后不会泄露给这里。
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

  # DIRECT 出口使用国内 DNS，保证国内 CDN 命中。
  direct-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  direct-nameserver-follow-policy: true

  # respect-rules 需要 proxy-server-nameserver，避免节点域名解析进入代理递归。
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

  # 国内域名走国内 DNS；明确代理域名走海外 DoH，并由规则送进代理。
  nameserver-policy:
    "geosite:private,cn,apple-cn,microsoft@cn,steam@cn,category-games@cn,google-cn":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    "rule-set:domestic_sensitive,domestic_ai_domain":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    "rule-set:ai_static,ai_acl4ssr,openai_acl4ssr,ai_domain,openai_domain,anthropic_domain,telegram_domain,youtube_domain,google_domain,github_domain,streaming_static,netflix_domain,disney_domain,hbo_domain,hulu_domain,primevideo_domain,spotify_domain,tiktok_domain,apple_tv_domain,discoveryplus_domain,bahamut_domain,biliintl_domain,geolocation_not_cn":
      - https://cloudflare-dns.com/dns-query
      - https://dns.google/dns-query

  respect-rules: true

# ============================================================
# Geo 数据库
# ============================================================
geodata-mode: true
geox-url!:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"
geo-auto-update: true
geo-update-interval: 24

# ============================================================
# 代理组：单美国节点场景，无需地区分组
# ============================================================
proxy-groups:
  - name: "🚀 节点选择"
    type: select
    proxies:
      - "♻️ 自动选择"
      - "🌐 全部节点"
      - DIRECT

  - name: "♻️ 自动选择"
    type: url-test
    include-all: true
    exclude-filter: "(?i)官网|流量|剩余|到期|套餐|订阅|expire|traffic"
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50
    timeout: 5000

  - name: "🌐 全部节点"
    type: select
    include-all: true
    exclude-filter: "(?i)官网|流量|剩余|到期|套餐|订阅|expire|traffic"

  - name: "🤖 AI 平台"
    type: select
    proxies:
      - "🚀 节点选择"
      - "♻️ 自动选择"
      - "🌐 全部节点"
      - DIRECT

  - name: "📲 电报消息"
    type: select
    proxies:
      - "🚀 节点选择"
      - "♻️ 自动选择"
      - "🌐 全部节点"
      - DIRECT

  - name: "📹 油管视频"
    type: select
    proxies:
      - "🚀 节点选择"
      - "♻️ 自动选择"
      - "🌐 全部节点"
      - DIRECT

  - name: "🎬 流媒体解锁"
    type: select
    proxies:
      - "🚀 节点选择"
      - "♻️ 自动选择"
      - "🌐 全部节点"
      - DIRECT

  - name: "Ⓜ️ 微软服务"
    type: select
    proxies:
      - DIRECT
      - "🚀 节点选择"
      - "♻️ 自动选择"
      - "🌐 全部节点"

  - name: "🍎 苹果服务"
    type: select
    proxies:
      - DIRECT
      - "🚀 节点选择"
      - "♻️ 自动选择"
      - "🌐 全部节点"

  - name: "🛑 广告拦截"
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: "🎯 全球直连"
    type: select
    proxies:
      - DIRECT
      - "🚀 节点选择"

  - name: "🐟 漏网之鱼"
    type: select
    proxies:
      - "🚀 节点选择"
      - "♻️ 自动选择"
      - "🌐 全部节点"
      - DIRECT

