# ============================================================
# 路由规则：从上到下匹配，域名规则优先，IP 规则带 no-resolve。
# ============================================================
rules:
  # 内网 / 局域网直连
  - "RULE-SET,private_domain,🎯 全球直连"
  - "RULE-SET,private_ip,🎯 全球直连,no-resolve"
  - "GEOSITE,private,🎯 全球直连"
  - "GEOIP,private,🎯 全球直连,no-resolve"
  - "DOMAIN-SUFFIX,msftconnecttest.com,🎯 全球直连"
  - "DOMAIN-SUFFIX,msftncsi.com,🎯 全球直连"

  # DoH / DNS 泄露检测域名必须走代理，避免测试和海外 DNS 查询走直连。
  - "DOMAIN-SUFFIX,cloudflare-dns.com,🚀 节点选择"
  - "DOMAIN-SUFFIX,dns.cloudflare.com,🚀 节点选择"
  - "DOMAIN-SUFFIX,dns.google,🚀 节点选择"
  - "DOMAIN-SUFFIX,one.one.one.one,🚀 节点选择"
  - "DOMAIN-SUFFIX,dns.quad9.net,🚀 节点选择"
  - "DOMAIN-SUFFIX,doh.opendns.com,🚀 节点选择"
  - "DOMAIN-SUFFIX,ipleak.net,🚀 节点选择"
  - "DOMAIN-SUFFIX,browserleaks.com,🚀 节点选择"
  - "DOMAIN-SUFFIX,dnsleaktest.com,🚀 节点选择"
  - "DOMAIN-SUFFIX,dnsleak.com,🚀 节点选择"
  - "RULE-SET,prevent_dns_leak,🚀 节点选择"

  # 国内支付 / 银行 / 政务 / 中国 AI 服务优先直连，避免风控和绕路。
  - "RULE-SET,domestic_sensitive,🎯 全球直连"
  - "RULE-SET,domestic_ai_domain,🎯 全球直连"

  # 广告
  - "RULE-SET,ads_domain,🛑 广告拦截"

  # AI / 通讯 / 视频 / 开发服务：默认走美国节点
  - "RULE-SET,ai_static,🤖 AI 平台"
  - "RULE-SET,ai_acl4ssr,🤖 AI 平台"
  - "RULE-SET,openai_acl4ssr,🤖 AI 平台"
  - "RULE-SET,ai_domain,🤖 AI 平台"
  - "RULE-SET,openai_domain,🤖 AI 平台"
  - "RULE-SET,anthropic_domain,🤖 AI 平台"
  - "DOMAIN-KEYWORD,openai,🤖 AI 平台"
  - "DOMAIN-KEYWORD,chatgpt,🤖 AI 平台"
  - "DOMAIN-KEYWORD,anthropic,🤖 AI 平台"
  - "DOMAIN-KEYWORD,claude,🤖 AI 平台"
  - "DOMAIN-SUFFIX,ai.com,🤖 AI 平台"
  - "RULE-SET,telegram_domain,📲 电报消息"
  - "RULE-SET,telegram_ip,📲 电报消息,no-resolve"
  - "RULE-SET,youtube_domain,📹 油管视频"

  # 流媒体解锁：单美国节点下统一走美国出口。
  - "RULE-SET,streaming_static,🎬 流媒体解锁"
  - "RULE-SET,netflix_domain,🎬 流媒体解锁"
  - "RULE-SET,disney_domain,🎬 流媒体解锁"
  - "RULE-SET,hbo_domain,🎬 流媒体解锁"
  - "RULE-SET,hulu_domain,🎬 流媒体解锁"
  - "RULE-SET,primevideo_domain,🎬 流媒体解锁"
  - "RULE-SET,spotify_domain,🎬 流媒体解锁"
  - "RULE-SET,tiktok_domain,🎬 流媒体解锁"
  - "RULE-SET,apple_tv_domain,🎬 流媒体解锁"
  - "RULE-SET,discoveryplus_domain,🎬 流媒体解锁"
  - "RULE-SET,bahamut_domain,🎬 流媒体解锁"
  - "RULE-SET,biliintl_domain,🎬 流媒体解锁"

  - "RULE-SET,github_domain,🚀 节点选择"
  - "RULE-SET,google_cn_domain,🎯 全球直连"
  - "RULE-SET,google_domain,🚀 节点选择"

  # 微软 / 苹果：默认直连，但可在策略组里手动切到代理。
  - "RULE-SET,microsoft_cn_domain,Ⓜ️ 微软服务"
  - "RULE-SET,onedrive_domain,Ⓜ️ 微软服务"
  - "RULE-SET,microsoft_domain,Ⓜ️ 微软服务"
  - "RULE-SET,apple_cn_domain,🍎 苹果服务"
  - "RULE-SET,apple_domain,🍎 苹果服务"

  # 常见中国接入点和国内域名/IP 直连
  - "RULE-SET,steam_cn_domain,🎯 全球直连"
  - "RULE-SET,games_cn_domain,🎯 全球直连"
  - "RULE-SET,cn_domain,🎯 全球直连"
  - "GEOSITE,cn,🎯 全球直连"
  - "RULE-SET,cn_ip,🎯 全球直连,no-resolve"
  - "GEOIP,CN,🎯 全球直连,no-resolve"

  # 明确非中国域名和其他漏网流量默认走美国节点。
  - "RULE-SET,geolocation_not_cn,🚀 节点选择"
  - "MATCH,🐟 漏网之鱼"
